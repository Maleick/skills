# Example Ralph Wiggum Loop configuration
# Required keys: goal, repo_path, test_command, acceptance_criteria

goal: "Repair the repository until tests pass"
repo_path: "/tmp/ralph-demo"
test_command: "python3 -m unittest -q"
acceptance_criteria:
  - tests_pass

# Optional verification
lint_command: ""

# Loop controls
mode: "auto"            # auto | step
max_iterations: 8
sleep_seconds: 0

# Guardrails
allowed_paths:
  - "calculator.py"
  - "test_calculator.py"
dry_run: false
readonly: false

# State location (defaults to repo_path if omitted)
work_dir: ""

# LLM adapter (stub for offline, openai for model-driven planning)
llm:
  adapter: "stub"                        # stub | openai
  model: "gpt-4.1-mini"                 # used when adapter=openai
  base_url: "https://api.openai.com/v1" # optional override
  api_key_env: "OPENAI_API_KEY"         # env var to read API key from
  timeout_seconds: 60                   # request timeout for OpenAI calls

# Optional context tuning
loop_memory_window: 5
output_tail_lines: 120
